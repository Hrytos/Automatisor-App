<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1080" width="780" height="1080" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="780" height="1080" fill="#0f1117" rx="0"/>

  <!-- Title -->
  <text x="390" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Credits &amp; Usage — Data Flow</text>

  <!-- Legend -->
  <rect x="30" y="58" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="50" y="70" font-size="11" fill="#9ab8d8">Frontend</text>
  <rect x="120" y="58" width="14" height="14" rx="3" fill="#2d1f4e" stroke="#9b6dff" stroke-width="1.5"/>
  <text x="140" y="70" font-size="11" fill="#9ab8d8">API Route</text>
  <rect x="220" y="58" width="14" height="14" rx="3" fill="#3b1f1f" stroke="#f25c19" stroke-width="1.5"/>
  <text x="240" y="70" font-size="11" fill="#9ab8d8">Database</text>
  <rect x="320" y="58" width="14" height="14" rx="3" fill="#1f3b2a" stroke="#34d399" stroke-width="1.5"/>
  <text x="340" y="70" font-size="11" fill="#9ab8d8">Python Logic</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555e6e"/>
    </marker>
  </defs>

  <!-- NODES -->

  <!-- 1: User opens page -->
  <rect x="190" y="90" width="400" height="62" rx="10" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="390" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#cce5ff">User opens /workspace/credits</text>
  <text x="390" y="136" text-anchor="middle" font-size="11" fill="#8ab4d4">CreditsPage.jsx</text>

  <!-- arrow 1→2 -->
  <line x1="390" y1="152" x2="390" y2="175" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2: fetchJson -->
  <rect x="150" y="176" width="480" height="62" rx="10" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="390" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#cce5ff">useEffect → fetchJson</text>
  <text x="390" y="222" text-anchor="middle" font-size="11" fill="#8ab4d4">POST /api/credits/usage   body: { email }</text>

  <!-- arrow 2→3 -->
  <line x1="390" y1="238" x2="390" y2="261" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3: FastAPI route -->
  <rect x="190" y="262" width="400" height="62" rx="10" fill="#2d1f4e" stroke="#9b6dff" stroke-width="1.5"/>
  <text x="390" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#e0d0ff">FastAPI  POST /api/credits/usage</text>
  <text x="390" y="308" text-anchor="middle" font-size="11" fill="#b8a8e0">backend/main.py</text>

  <!-- arrow 3→4 -->
  <line x1="390" y1="324" x2="390" y2="347" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4: DB query 1 -->
  <rect x="110" y="348" width="560" height="68" rx="10" fill="#3b1f1f" stroke="#f25c19" stroke-width="1.5"/>
  <text x="390" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#ffdccc">DB Query 1 — automatisor_customer</text>
  <text x="390" y="390" text-anchor="middle" font-size="11" fill="#e0b8a0">SELECT customer_id, email_verified_at  WHERE email = ?</text>
  <text x="390" y="408" text-anchor="middle" font-size="10" fill="#c07050">→ get customer_id + billing anchor date</text>

  <!-- arrow 4→5 -->
  <line x1="390" y1="416" x2="390" y2="439" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5: DB query 2 -->
  <rect x="110" y="440" width="560" height="68" rx="10" fill="#3b1f1f" stroke="#f25c19" stroke-width="1.5"/>
  <text x="390" y="464" text-anchor="middle" font-size="12" font-weight="600" fill="#ffdccc">DB Query 2 — automatisor_billing</text>
  <text x="390" y="482" text-anchor="middle" font-size="11" fill="#e0b8a0">SELECT site_id, usage_type, credits_used, created_at</text>
  <text x="390" y="500" text-anchor="middle" font-size="10" fill="#c07050">WHERE customer_id = ?   ORDER BY created_at DESC</text>

  <!-- arrow 5→6 -->
  <line x1="390" y1="508" x2="390" y2="531" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6: DB query 3 -->
  <rect x="110" y="532" width="560" height="68" rx="10" fill="#3b1f1f" stroke="#f25c19" stroke-width="1.5"/>
  <text x="390" y="556" text-anchor="middle" font-size="12" font-weight="600" fill="#ffdccc">DB Query 3 — account_sites</text>
  <text x="390" y="574" text-anchor="middle" font-size="11" fill="#e0b8a0">SELECT site_id, company_name, full_address</text>
  <text x="390" y="592" text-anchor="middle" font-size="10" fill="#c07050">WHERE site_id IN (unique ids from billing rows)</text>

  <!-- arrow 6→7 -->
  <line x1="390" y1="600" x2="390" y2="623" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7: anchor date logic -->
  <rect x="110" y="624" width="560" height="80" rx="10" fill="#1f3b2a" stroke="#34d399" stroke-width="1.5"/>
  <text x="390" y="648" text-anchor="middle" font-size="12" font-weight="600" fill="#d0ffe8">Determine billing anchor date</text>
  <text x="390" y="666" text-anchor="middle" font-size="11" fill="#90d4b0">① email_verified_at  from customer row</text>
  <text x="390" y="682" text-anchor="middle" font-size="11" fill="#90d4b0">② oldest billing row created_at  (fallback)</text>
  <text x="390" y="698" text-anchor="middle" font-size="11" fill="#90d4b0">③ now()  (last resort)</text>

  <!-- arrow 7→8 -->
  <line x1="390" y1="704" x2="390" y2="727" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 8: group logic -->
  <rect x="110" y="728" width="560" height="68" rx="10" fill="#1f3b2a" stroke="#34d399" stroke-width="1.5"/>
  <text x="390" y="752" text-anchor="middle" font-size="12" font-weight="600" fill="#d0ffe8">Group billing rows into 30-day periods</text>
  <text x="390" y="772" text-anchor="middle" font-size="11" fill="#90d4b0">period_index = ⌊ (row_timestamp − anchor).days ÷ 30 ⌋</text>
  <text x="390" y="790" text-anchor="middle" font-size="10" fill="#60b080">period_start = anchor + idx×30d   |   period_end = anchor + (idx+1)×30d − 1s</text>

  <!-- arrow 8→9 -->
  <line x1="390" y1="796" x2="390" y2="819" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 9: JSON response -->
  <rect x="150" y="820" width="480" height="80" rx="10" fill="#2d1f4e" stroke="#9b6dff" stroke-width="1.5"/>
  <text x="390" y="844" text-anchor="middle" font-size="12" font-weight="600" fill="#e0d0ff">Return JSON response</text>
  <text x="390" y="862" text-anchor="middle" font-size="11" fill="#b8a8e0">{ billing_anchor_date, billing_periods: [</text>
  <text x="390" y="879" text-anchor="middle" font-size="11" fill="#b8a8e0">{ period_index, period_start, period_end,</text>
  <text x="390" y="896" text-anchor="middle" font-size="11" fill="#b8a8e0">is_current, total_credits_used, rows[] } ] }</text>

  <!-- arrow 9→10 -->
  <line x1="390" y1="900" x2="390" y2="923" stroke="#555e6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 10: render -->
  <rect x="150" y="924" width="480" height="62" rx="10" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="390" y="950" text-anchor="middle" font-size="13" font-weight="600" fill="#cce5ff">Frontend renders UI</text>
  <text x="390" y="970" text-anchor="middle" font-size="11" fill="#8ab4d4">Current-period summary card  +  usage history accordion</text>

  <!-- Footer -->
  <text x="390" y="1060" text-anchor="middle" font-size="10" fill="#444c5e">AutomatiSOR — Credits &amp; Usage Flow  |  3 DB tables  |  all period math in Python</text>
</svg>
